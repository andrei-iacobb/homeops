# Home Assistant Lovelace dashboard - Homeops Monitoring
#
# Why a single view: switching Lovelace views destroys/re-creates iframes, so
# every click would re-fetch the Grafana panel. ONE view = iframes mount once,
# stay loaded, and only refresh on their own ?refresh=30s interval.
#
# URL trick: `&kiosk=1` removes Grafana's panel chrome (duplicate title,
# "Powered by Grafana", filter buttons) so HA's card frame is the only border.
#
# How to install:
#   1. Settings -> Dashboards -> Add Dashboard -> "New dashboard from scratch"
#   2. Open it -> three dots -> Edit dashboard -> three dots -> Raw configuration editor
#   3. Paste this YAML, Save.

title: Homelab Monitoring
views:
  - title: Monitoring
    icon: mdi:view-dashboard
    path: monitoring
    type: sections
    max_columns: 4
    sections:

      # ===== STATUS TILES =====
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Status
            heading_style: title
          - type: iframe
            url: https://grafana.iacob.uk/d-solo/truenas/truenas-monitoring?orgId=1&panelId=1&theme=dark&kiosk=1&refresh=30s
            aspect_ratio: '100%'
            grid_options:
              columns: 6
              rows: 4
          - type: iframe
            url: https://grafana.iacob.uk/d-solo/ilo/hp-ilo-monitoring?orgId=1&panelId=1&theme=dark&kiosk=1&refresh=30s
