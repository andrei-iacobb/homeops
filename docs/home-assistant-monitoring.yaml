# Home Assistant Lovelace dashboard - Homeops Monitoring
#
# This is what's currently deployed in Home Assistant at /dashboard-homelab.
# Each iframe card embeds a single Grafana panel from grafana.iacob.uk.
# Card_mod (HACS) is required for the overlay that hides the "Powered by
# Grafana" badge that anonymous viewers always see.
#
# To re-install or duplicate:
#   1. Settings -> Dashboards -> Add Dashboard -> New from scratch
#   2. Open it -> Edit -> three dots -> Raw configuration editor
#   3. Paste this YAML, Save.

title: Homelab Monitoring
views:
  - title: Overview
    icon: mdi:view-dashboard
    path: overview
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - { type: heading, heading: Status, heading_style: title }
          - &iframe_overview
            type: iframe
            url: https://grafana.iacob.uk/d-solo/truenas/truenas-monitoring?orgId=1&theme=dark&kiosk=1&refresh=30s&from=now-1h&to=now&panelId=1
            aspect_ratio: 100%
            grid_options: { columns: 6, rows: 4 }
            card_mod:
              style: |
                ha-card { position: relative; overflow: hidden; }
                ha-card::after {
                  content: "";
                  position: absolute;
                  top: 5px; right: 5px;
                  width: 130px; height: 28px;
                  background: #181b1f;
                  border-radius: 3px;
                  z-index: 99;
                  pointer-events: none;
                }
          # ... see deployed config; full layout has Storage, Servers, DNS, Cluster tabs
