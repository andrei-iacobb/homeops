          - type: heading
            heading: Proxmox (full)
            heading_style: title
          - type: iframe
            url: https://grafana.iacob.uk/d/proxmox/proxmox-cluster?orgId=1&kiosk=tv&theme=dark&refresh=30s
            aspect_ratio: '60%'
