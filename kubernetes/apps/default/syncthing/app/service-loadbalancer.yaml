---
apiVersion: v1
kind: Service
metadata:
  name: syncthing-loadbalancer
  namespace: default
  annotations:
    lbipam.cilium.io/ips: "192.168.1.12"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: syncthing
    app.kubernetes.io/instance: syncthing
  ports:
    - name: sync-tcp
      protocol: TCP
      port: 22000
      targetPort: 22000
    - name: sync-udp
      protocol: UDP
      port: 22000
      targetPort: 22000
    - name: discovery
      protocol: UDP
      port: 21027
      targetPort: 21027
