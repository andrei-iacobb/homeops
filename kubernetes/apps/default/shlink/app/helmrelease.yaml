---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shlink
spec:
  chartRef:
    kind: OCIRepository
    name: shlink
  interval: 1h
  values:
    controllers:
      api:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: shlinkio/shlink
              tag: stable
            env:
              TZ: Europe/London
              DEFAULT_DOMAIN: s.iacob.co.uk
              IS_HTTPS_ENABLED: "true"
              DB_DRIVER: postgres
            envFrom:
              - secretRef:
                  name: shlink-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /rest/health
                    port: &apiport 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /rest/health
                    port: *apiport
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              readOnlyRootFilesystem: false
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 1Gi
      web:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: shlinkio/shlink-web-client
              tag: stable
            env:
              TZ: Europe/London
            probes:
              liveness: &webprobes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &webport 8080
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *webprobes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
    service:
      api:
        controller: api
        ports:
          http:
            port: *apiport
      web:
        controller: web
        ports:
          http:
            port: *webport
    route:
      api:
        hostnames: ["s.iacob.co.uk"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: api
                port: *apiport
      web:
        hostnames: ["shlink.iacob.uk"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: web
                port: *webport
