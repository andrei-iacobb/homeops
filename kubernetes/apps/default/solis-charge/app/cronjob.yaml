---
# Programs Solis inverter charge / discharge slots based on:
#   - Octopus Agile rates (charge when <= 15p/kWh)
#   - Octoplus Free Electricity / Power-ups (force-charge during)
#   - Octoplus Saving Sessions (discharge during)
#
# Hourly cadence so Power-up / Saving Session announcements made during the
# day are picked up without waiting for the nightly run.
#
# Times sent to the inverter are UTC because the SolisCloud station is
# configured as UTC+0 and the HACS solis integration does not TZ-convert.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: solis-charge
spec:
  schedule: "5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: solis-charge
              image: python:3.14-alpine
              command:
                - python
                - /scripts/solis_agile_charge.py
              envFrom:
                - secretRef:
                    name: solis-charge-secret
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 128Mi
          volumes:
            - name: script
              configMap:
                name: solis-charge-script
