---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: default
  labels:
    app.kubernetes.io/name: website
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: website
      app.kubernetes.io/instance: website
      app.kubernetes.io/name: website
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: website
        app.kubernetes.io/instance: website
        app.kubernetes.io/name: website
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: website
          image: ghcr.io/andrei-iacobb/website:latest@sha256:265bb98e4ade839cf073944c2b6890aa58832df1b171ba01f9a486cb3d9ec28d
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: REDIS_HOST
              value: redis.databases.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: website-secret
                  key: REDIS_PASSWORD
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: website-secret
                  key: GITHUB_TOKEN
            - name: FORGEJO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: website-secret
                  key: FORGEJO_TOKEN
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
