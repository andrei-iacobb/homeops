---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo
  interval: 1h
  values:
    controllers:
      gitea:
        strategy: Recreate
        initContainers:
          init-permissions:
            image:
              repository: busybox
              tag: "1.38"
            command:
              - /bin/sh
              - -c
              - |
                mkdir -p /data/gitea/conf
                chown -R 1000:1000 /data
                chmod -R 755 /data
            securityContext:
              runAsUser: 0
              runAsGroup: 0
          init-custom:
            # Lay down the public profile-card template override before Forgejo starts.
            image:
              repository: busybox
              tag: "1.38"
            command:
              - /bin/sh
              - -c
              - |
                mkdir -p /data/gitea/templates/user
                cp /custom-src/profile.tmpl /data/gitea/templates/user/profile.tmpl
                chown -R 1000:1000 /data/gitea/templates
            securityContext:
              runAsUser: 0
              runAsGroup: 0
        containers:
          perms-fix:
            image:
              repository: busybox
              tag: "1.38"
            command:
              - /bin/sh
              - -c
              - |
                while true; do
                  chmod 750 /data/ssh /data/git/.ssh 2>/dev/null || true
                  chmod 640 /data/git/.ssh/authorized_keys 2>/dev/null || true
                  sleep 60
                done
            securityContext:
              runAsUser: 0
              runAsGroup: 0
          app:
            image:
              repository: codeberg.org/forgejo/forgejo
              tag: 15.0.3
            env:
              USER_UID:
                valueFrom:
                  secretKeyRef:
                    name: forgejo-secret
                    key: PUID
              USER_GID:
                valueFrom:
                  secretKeyRef:
                    name: forgejo-secret
                    key: PGID
              FORGEJO__database__DB_TYPE: postgres
              FORGEJO__database__HOST: postgres.databases.svc.cluster.local:5432
              FORGEJO__database__NAME: gitea
              FORGEJO__database__USER: gitea
              FORGEJO__database__PASSWD:
                valueFrom:
                  secretKeyRef:
                    name: forgejo-secret
                    key: GITEA_DB_PASSWORD
              FORGEJO__actions__ENABLED: "true"
              FORGEJO__actions__DEFAULT_ACTIONS_URL: "github"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "SETUID", "SETGID", "DAC_OVERRIDE", "FOWNER"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 2000m
                memory: 2Gi
          heatmap-gen:
            # Writes a full-activity contribution graph (daily counts only, never
            # repo names) to a static JSON the public profile card fetches. Refreshed
            # hourly so the graph stays live even though every repo is private.
            image:
              repository: postgres
              tag: "17-alpine"
            env:
              PGHOST: postgres.databases.svc.cluster.local
              PGUSER: gitea
              PGDB: gitea
              PGPASS:
                valueFrom:
                  secretKeyRef:
                    name: forgejo-secret
                    key: GITEA_DB_PASSWORD
            command:
              - /bin/sh
              - -c
              - |
                cat > /tmp/q.sql <<'EOF'
                SELECT json_build_object('generated',extract(epoch from now())::int,'total',(SELECT count(*) FROM action WHERE act_user_id=(SELECT id FROM "user" WHERE lower_name='andrei') AND created_unix > extract(epoch from now())::int - 31536000),'days',COALESCE((SELECT json_agg(json_build_object('date',d,'count',c) ORDER BY d) FROM (SELECT to_char(to_timestamp(created_unix) AT TIME ZONE 'UTC','YYYY-MM-DD') d, count(*) c FROM action WHERE act_user_id=(SELECT id FROM "user" WHERE lower_name='andrei') AND created_unix > extract(epoch from now())::int - 31536000 GROUP BY 1) s),'[]'::json));
                EOF
                DIR=/data/gitea/public/assets/data
                mkdir -p "$${DIR}"
                while true; do
                  if PGPASSWORD="$${PGPASS}" psql -h "$${PGHOST}" -U "$${PGUSER}" -d "$${PGDB}" -tAf /tmp/q.sql > "$${DIR}/heatmap.json.tmp" 2>/dev/null; then
                    mv "$${DIR}/heatmap.json.tmp" "$${DIR}/heatmap.json"
                  fi
                  sleep 3600
                done
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 250m
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        seccompProfile:
          type: Unconfined
    service:
      app:
        ports:
          http:
            port: 3000
          ssh:
            port: 22
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        size: 20Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /data
      custom-templates:
        type: configMap
        name: forgejo-custom-templates
        advancedMounts:
          gitea:
            init-custom:
              - path: /custom-src
    route:
      app:
        hostnames: ["git.iacob.co.uk"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 3000
