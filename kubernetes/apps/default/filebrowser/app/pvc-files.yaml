---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: filebrowser-files-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 10.10.10.3
    path: /mnt/plex/files
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser-files
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: filebrowser-files-pv
  resources:
    requests:
      storage: 1Ti
