---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: default
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: /data/.runner
      capacity: 1
      timeout: 3h
      shutdown_timeout: 3h
      fetch_timeout: 30s
      fetch_interval: 2s
    cache:
      enabled: true
      dir: /data/cache
    container:
      network: host
      privileged: false
      # dind exposes /shared-run/docker.sock via the shared emptyDir; act_runner
      # mounts it into job containers as /var/run/docker.sock.
      docker_host: unix:///shared-run/docker.sock
      valid_volumes:
        - "**"
      force_pull: false
    host:
      workdir_parent: /data/workdir
