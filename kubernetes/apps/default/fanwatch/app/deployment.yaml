---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fanwatch
  namespace: default
  labels:
    app: fanwatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fanwatch
  template:
    metadata:
      labels:
        app: fanwatch
    spec:
      containers:
        - name: fanwatch
          image: python:3.14-slim
          command: ["python3", "/app/app.py"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: POLL_SECONDS
              value: "15"
            - name: ILO_TARGETS
              value: "DL360=192.168.1.175,DL380=192.168.1.180"
            - name: ILO_USER
              value: "Administrator"
            - name: ILO_PASS_DL360
              valueFrom:
                secretKeyRef:
                  name: fanwatch-secret
                  key: ILO_PASS_DL360
            - name: ILO_PASS_DL380
              valueFrom:
                secretKeyRef:
                  name: fanwatch-secret
                  key: ILO_PASS_DL380
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 48Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: app
              mountPath: /app
            - name: data
              mountPath: /data
      volumes:
        - name: app
          configMap:
            name: fanwatch-code
        - name: data
          persistentVolumeClaim:
            claimName: fanwatch-data
