---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefly-iii
spec:
  chartRef:
    kind: OCIRepository
    name: firefly-iii
  interval: 1h
  values:
    controllers:
      firefly-iii:
        strategy: Recreate
        containers:
          app:
            image:
              repository: fireflyiii/core
              tag: version-6.6.3
            env:
              TZ: Europe/London
              APP_ENV: production
              APP_DEBUG: "false"
              SITE_OWNER: andreigiacob06@gmail.com
              DEFAULT_LANGUAGE: en_US
              DEFAULT_LOCALE: equal
              TRUSTED_PROXIES: "**"
              APP_URL: https://firefly.iacob.co.uk
              DB_CONNECTION: pgsql
              DB_HOST: postgres.databases.svc.cluster.local
              DB_PORT: "5432"
              DB_DATABASE: firefly
              DB_USERNAME: firefly
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: firefly-iii-secret
                    key: DB_PASSWORD
              APP_KEY:
                valueFrom:
                  secretKeyRef:
                    name: firefly-iii-secret
                    key: APP_KEY
              STATIC_CRON_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: firefly-iii-secret
                    key: STATIC_CRON_TOKEN
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["firefly.iacob.uk"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        size: 5Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /var/www/html/storage
