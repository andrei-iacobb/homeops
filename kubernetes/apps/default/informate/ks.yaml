---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: informate
spec:
  interval: 1h
  path: ./kubernetes/apps/default/informate/app
  postBuild:
    substitute:
      APP: informate
      APP_PVC: informate
      VOLSYNC_SCHEDULE: "15 3 * * *"
      MOVER_UID: "0"
      MOVER_GID: "0"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: volsync-secret
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  wait: false
