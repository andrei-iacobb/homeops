---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sharerr
  namespace: default
  labels:
    app.kubernetes.io/name: sharerr
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: sharerr
      app.kubernetes.io/instance: sharerr
      app.kubernetes.io/name: sharerr
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: sharerr
        app.kubernetes.io/instance: sharerr
        app.kubernetes.io/name: sharerr
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      containers:
        - name: sharerr
          image: ghcr.io/andrei-iacobb/sharerr:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: sharerr-secret
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
