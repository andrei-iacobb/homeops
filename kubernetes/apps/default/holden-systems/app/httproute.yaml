---
# Validation-only hostname while we test. Once the cluster pod proves out,
# add `hs.iacobapp.dev` here and flip the Cloudflare-tunnel ingress to
# stop pointing at the laptop.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: holden-systems
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - hs-k8s.iacob.uk
  rules:
    - backendRefs:
        - name: holden-systems
          port: 8080
