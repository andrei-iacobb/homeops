---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - loki.iacob.uk
  rules:
    - backendRefs:
        - name: loki
          namespace: monitoring
          port: 3100
