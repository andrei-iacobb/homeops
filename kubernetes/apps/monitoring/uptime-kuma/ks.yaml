---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: uptime-kuma
spec:
  interval: 1h
  path: ./kubernetes/apps/monitoring/uptime-kuma/app
  postBuild:
    substitute:
      APP: uptime-kuma
      APP_PVC: uptime-kuma
      VOLSYNC_SCHEDULE: "15 3 * * *"
      MOVER_UID: "1000"
      MOVER_GID: "1000"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: volsync-secret
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: monitoring
  wait: false
