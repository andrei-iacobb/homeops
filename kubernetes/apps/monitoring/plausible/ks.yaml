---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plausible
spec:
  interval: 1h
  path: ./kubernetes/apps/monitoring/plausible/app
  postBuild:
    substitute:
      APP: plausible
      APP_PVC: plausible-plausible-data
      VOLSYNC_SCHEDULE: "15 4 * * *"
      MOVER_UID: "0"
      MOVER_GID: "0"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: volsync-secret
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: monitoring
  wait: false
