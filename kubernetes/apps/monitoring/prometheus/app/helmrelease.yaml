---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      version: "82.4.0"
  releaseName: prometheus
  interval: 1h
  values:
    prometheus:
      enabled: true
      prometheusSpec:
        retention: 14d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: openebs-hostpath
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        serviceMonitorSelectorNilUsesHelmValues: false
        # Restrict to monitoring namespace only; Prometheus SA lacks RBAC elsewhere (causes 500)
        serviceMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorNamespaceSelector: {}
        ruleSelectorNilUsesHelmValues: false
        additionalScrapeConfigs:
          - job_name: wireguard
            static_configs:
              - targets:
                  - 192.168.1.67:9586
                labels:
                  instance: wireguard-vpn
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            memory: 4Gi
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: openebs-hostpath
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
    kubeApiServer:
      enabled: true
    kubelet:
      enabled: true
    kubeControllerManager:
      enabled: true
    kubeScheduler:
      enabled: true
    kubeStateMetrics:
      enabled: true
    nodeExporter:
      enabled: true
    grafana:
      enabled: true
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
          isDefault: false
          editable: true
      persistence:
        enabled: true
        storageClassName: openebs-hostpath
        size: 10Gi
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: monitoring
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
        datasources:
          enabled: false
      dashboards:
        default:
          node-exporter-full:
            gnetId: 1860
            revision: 37
            datasource: Prometheus
          kubernetes-views-pods:
            gnetId: 15760
            revision: 40
            datasource: Prometheus
          kubernetes-views-global:
            gnetId: 15757
            revision: 43
            datasource: Prometheus
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
    prometheusOperator:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
