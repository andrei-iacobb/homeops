---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cluster-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus-stack
    role: alert-rules
spec:
  groups:
    # ── Node Health ─────────────────────────────────────────────
    - name: node-health
      rules:
        - alert: NodeDiskRunningFull
          expr: |
            (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node root disk is {{ $value | humanize }}% free"
            description: "Root filesystem on {{ $labels.instance }} has less than 10% space remaining."

        - alert: NodeDiskPressure
          expr: |
            (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node root disk is {{ $value | humanize }}% free"
            description: "Root filesystem on {{ $labels.instance }} has less than 15% space remaining."

        - alert: NodeMemoryPressure
          expr: |
            (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node memory usage is {{ $value | humanize }}%"
            description: "Memory usage on {{ $labels.instance }} has been above 90% for 10 minutes."

        - alert: NodeCPUHighUsage
          expr: |
            100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Node CPU usage is {{ $value | humanize }}%"
            description: "CPU usage on {{ $labels.instance }} has been above 90% for 15 minutes."

        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not ready"
            description: "Node has been in NotReady state for more than 5 minutes."

    # ── Pod Health ──────────────────────────────────────────────
    - name: pod-health
      rules:
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total[1h]) > 5
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted {{ $value }} times in the last hour."

        - alert: PodNotReady
          expr: |
            kube_pod_status_phase{phase=~"Pending|Unknown"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: "Pod has been in {{ $labels.phase }} state for more than 15 minutes."

        - alert: ContainerOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} was OOM killed"
            description: "Consider increasing memory limits for this container."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas != kube_deployment_status_available_replicas
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"
            description: "Expected {{ $value }} replicas but not all are available."

    # ── PVC Storage ─────────────────────────────────────────────
    - name: pvc-storage
      rules:
        - alert: PVCAlmostFull
          expr: |
            (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) * 100 < 15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanize }}% free"
            description: "Persistent volume claim has less than 15% space remaining."

        - alert: PVCCriticallyFull
          expr: |
            (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) * 100 < 5
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanize }}% free"
            description: "Persistent volume claim has less than 5% space remaining. Immediate action required."

    # ── Certificate Health ──────────────────────────────────────
    - name: certificate-health
      rules:
        - alert: CertificateExpiringSoon
          expr: |
            certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 24 * 3600
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.name }} expires in less than 14 days"
            description: "Certificate in namespace {{ $labels.namespace }} is expiring soon. Check cert-manager logs."

        - alert: CertificateExpired
          expr: |
            certmanager_certificate_expiration_timestamp_seconds - time() < 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Certificate {{ $labels.name }} has expired"
            description: "Certificate in namespace {{ $labels.namespace }} has expired."

    # ── Exporter Health ─────────────────────────────────────────
    - name: exporter-health
      rules:
        - alert: PrometheusTargetDown
          expr: up == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus target {{ $labels.job }}/{{ $labels.instance }} is down"
            description: "Target has been unreachable for more than 5 minutes."

    # ── Solis Battery Automation ────────────────────────────────
    # The solis-charge CronJob programs inverter charge slots hourly.
    # In Jul 2026 the inverter silently stopped honouring slots for
    # weeks (567 kWh grid import). These alerts make ANY breakage of
    # the automation pipeline visible. HA-side watchdog automations
    # cover the inverter/outcome; these cover the k8s side.
    - name: solis-charge
      rules:
        - alert: SolisChargeJobFailed
          expr: |
            kube_job_status_failed{namespace="default", job_name=~"solis-charge-.*"} > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "solis-charge job {{ $labels.job_name }} failed"
            description: "The Solis battery slot programmer failed (exit 4 = inverter storage mode wrong/unfixable; exit 1-3 = rates/TZ/safety). Battery may not grid-charge. Check: kubectl logs -n default job/{{ $labels.job_name }}"

        - alert: SolisChargeCronStale
          expr: |
            time() - kube_cronjob_status_last_successful_time{namespace="default", cronjob="solis-charge"} > 3 * 3600
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "solis-charge has not succeeded in {{ $value | humanizeDuration }}"
            description: "The hourly Solis battery slot programmer has no successful run for over 3h - suspended, failing, or not scheduling. Inverter slots are going stale. Check: kubectl get cronjob,jobs -n default | grep solis"

    # ── Flux GitOps Health ──────────────────────────────────────
    - name: flux-health
      rules:
        - alert: FluxReconciliationFailure
          expr: |
            gotk_reconcile_condition{type="Ready",status="False"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Flux reconciliation failing for {{ $labels.kind }}/{{ $labels.name }}"
            description: "{{ $labels.kind }} {{ $labels.name }} in namespace {{ $labels.namespace }} has been failing reconciliation for 15 minutes."

        - alert: FluxSuspended
          expr: |
            gotk_suspend_status == 1
          for: 24h
          labels:
            severity: info
          annotations:
            summary: "Flux resource {{ $labels.kind }}/{{ $labels.name }} is suspended"
            description: "Resource has been suspended for more than 24 hours. Was this intentional?"
