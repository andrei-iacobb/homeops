---
# Manual endpoint for the host-side WireGuard exporter (read-only) on DL360.
# Must share the Service name (wireguard-oci-exporter) for the ServiceMonitor to scrape it.
apiVersion: v1
kind: Endpoints
metadata:
  name: wireguard-oci-exporter
  labels:
    app: wireguard-oci-exporter
subsets:
  - addresses:
      - ip: 192.168.1.100
    ports:
      - name: metrics
        port: 9586
        protocol: TCP
