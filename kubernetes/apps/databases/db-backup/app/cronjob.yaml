---
# Logical PostgreSQL backups (pg_dumpall) uploaded to TrueNAS MinIO.
# Complements VolSync PVC snapshots with consistent, portable .sql.gz dumps.
# Writes into the existing `volsync` bucket under the db-logical/ prefix,
# reusing the same S3 credentials VolSync already uses (no new bucket needed).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-logical-backup
spec:
  schedule: "0 2 * * *" # daily 02:00 UTC (before VolSync's 02:00+ PVC backups spread out)
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 0
            fsGroup: 0
          containers:
            - name: pg-logical-backup
              image: postgres:16-alpine
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
              env:
                - name: PGHOST
                  value: postgres.databases.svc.cluster.local
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  value: postgres
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: volsync-secret
                      key: VOLSYNC_S3_ENDPOINT
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: volsync-secret
                      key: VOLSYNC_S3_BUCKET
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: volsync-secret
                      key: VOLSYNC_S3_ACCESS_KEY
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: volsync-secret
                      key: VOLSYNC_S3_SECRET_KEY
                - name: PREFIX
                  value: db-logical
                - name: KEEP_DAILY
                  value: "30"
                - name: KEEP_MONTHLY
                  value: "12"
              command:
                - /bin/sh
                - -euc
                - |
                  echo "[setup] installing tools"
                  apk add --no-cache ca-certificates curl >/dev/null

                  # minio-client: alpine's `mc` is Midnight Commander, so fetch the
                  # real one from dl.min.io. Retry to tolerate transient egress blips.
                  n=0
                  until curl -fsSL -o /usr/local/bin/mc \
                      https://dl.min.io/client/mc/release/linux-amd64/mc; do
                    n=$((n+1)); [ "$n" -ge 5 ] && echo "mc download failed" && exit 1
                    echo "[setup] mc download retry $n"; sleep 5
                  done
                  chmod +x /usr/local/bin/mc

                  TS=$(date -u +"%Y%m%dT%H%M%SZ")
                  FILE="/tmp/postgres_${TS}.sql.gz"

                  echo "[dump] pg_dumpall from ${PGHOST}"
                  # sh has no pipefail: dump to a temp file first so a pg_dumpall
                  # failure (partial or total) fails the job instead of uploading
                  # a truncated dump that gzip would happily 0-exit on.
                  pg_dumpall -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" --clean --if-exists > /tmp/dump.sql
                  gzip -9 < /tmp/dump.sql > "$FILE"
                  echo "[dump] size $(du -h "$FILE" | cut -f1)"

                  # sanity: dump must contain the expected trailer pg_dumpall writes
                  # last, which only appears if the dump ran to completion.
                  if ! tail -c 4096 /tmp/dump.sql | grep -q "PostgreSQL database cluster dump complete"; then
                    echo "[dump] ERROR dump did not complete cleanly" && exit 1
                  fi
                  rm -f /tmp/dump.sql

                  echo "[upload] configuring mc -> ${S3_ENDPOINT}"
                  mc alias set store "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY" --api S3v4 >/dev/null
                  mc cp "$FILE" "store/${S3_BUCKET}/${PREFIX}/postgres_${TS}.sql.gz"
                  echo "[upload] done -> ${S3_BUCKET}/${PREFIX}/postgres_${TS}.sql.gz"

                  echo "[retention] keep ${KEEP_DAILY} daily + ${KEEP_MONTHLY} monthly"
                  ALL=$(mc ls "store/${S3_BUCKET}/${PREFIX}/" | awk '{print $NF}' \
                    | grep -E '^postgres_.*\.sql\.gz$' | sort -r)
                  i=0; months=""
                  for obj in $ALL; do
                    if [ "$i" -lt "$KEEP_DAILY" ]; then i=$((i+1)); continue; fi
                    ym=$(echo "$obj" | sed -E 's/postgres_([0-9]{6}).*/\1/')
                    kept_months=$(echo "$months" | tr ';' '\n' | grep -c "^${ym}$" || true)
                    monthcount=$(echo "$months" | tr ';' '\n' | grep -v '^$' | sort -u | wc -l)
                    if [ "$kept_months" -eq 0 ] && [ "$monthcount" -lt "$KEEP_MONTHLY" ]; then
                      months="${months}${ym};"
                    else
                      echo "[retention] delete $obj"
                      mc rm "store/${S3_BUCKET}/${PREFIX}/${obj}" >/dev/null || true
                    fi
                  done

                  rm -f "$FILE"
                  echo "[done] backup complete"
