---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: radarr-lowq-movies-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 10.10.10.3
    path: /mnt/plex/media/movies-lowq
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-lowq-movies
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: radarr-lowq-movies-pv
  resources:
    requests:
      storage: 1Ti
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: radarr-lowq-downloads-pv
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 10.10.10.3
    path: /mnt/plex/media/downloads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-lowq-downloads
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: radarr-lowq-downloads-pv
  resources:
    requests:
      storage: 2Ti
