---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wizarr
spec:
  interval: 1h
  path: ./kubernetes/apps/media/wizarr/app
  postBuild:
    substitute:
      APP: wizarr
      APP_PVC: wizarr
      VOLSYNC_SCHEDULE: "50 3 * * *"
      MOVER_UID: "0"
      MOVER_GID: "0"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: volsync-secret
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
