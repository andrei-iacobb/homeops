---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ersatztv-media-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 10.10.10.3
    path: /mnt/plex/media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ersatztv-media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: ersatztv-media-pv
  resources:
    requests:
      storage: 1Ti
