---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: plex-cors
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: plex
  cors:
    allowOrigins:
      - type: Exact
        value: "https://sharerr.iacob.uk"
      - type: Exact
        value: "http://localhost:3939"
    allowMethods:
      - GET
      - OPTIONS
    allowHeaders:
      - "*"
    exposeHeaders:
      - Content-Length
      - Content-Type
    maxAge: 86400s
