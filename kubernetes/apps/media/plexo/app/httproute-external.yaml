---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plexo-external
  labels:
    app.kubernetes.io/name: plexo
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - plexo.iacob.co.uk
  rules:
    - backendRefs:
        - name: plexo
          port: 3000
