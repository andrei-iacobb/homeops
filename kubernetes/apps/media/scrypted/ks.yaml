---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: scrypted
spec:
  interval: 1h
  path: ./kubernetes/apps/media/scrypted/app
  postBuild:
    substitute:
      APP: scrypted
      APP_PVC: scrypted
      VOLSYNC_SCHEDULE: "30 3 * * *"
      MOVER_UID: "1000"
      MOVER_GID: "1000"
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: volsync-secret
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
