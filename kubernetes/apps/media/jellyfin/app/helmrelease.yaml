---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 1h
  values:
    controllers:
      jellyfin:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          fix-marker:
            image:
              repository: busybox
              tag: latest
            command: ["sh", "-c", "rm -f /config/.jellyfin-config && touch /config/.jellyfin-data"]
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
        containers:
          app:
            image:
              repository: docker.io/jellyfin/jellyfin
              tag: 10.11.7
            env:
              TZ: Europe/London
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 4000m
                memory: 8Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        seccompProfile:
          type: Unconfined
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        size: 10Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /config
      cache:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        size: 20Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /cache
      movies:
        type: persistentVolumeClaim
        existingClaim: jellyfin-movies
        globalMounts:
          - path: /data/movies
      tv:
        type: persistentVolumeClaim
        existingClaim: jellyfin-tv
        globalMounts:
          - path: /data/tv
      transcode:
        type: emptyDir
        globalMounts:
          - path: /config/transcodes
      music:
        type: persistentVolumeClaim
        existingClaim: jellyfin-music
        globalMounts:
          - path: /data/music
      books:
        type: persistentVolumeClaim
        existingClaim: jellyfin-books
        globalMounts:
          - path: /data/books
    route:
      app:
        hostnames: ["jellyfin.iacob.uk"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
