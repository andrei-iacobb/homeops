---
# Every minute of the 8 AM BST hour on Wednesdays, ask Sonarr whether
# anything that aired in the last ~36h is still missing and not yet in
# the download queue. If yes -> trigger RssSync. If no -> exit cheaply.
#
# Cuts Wed-morning Amazon Prime grab latency from up to 15 min (default
# RSS cycle) to ~1 min, and stops hammering the indexer once Sonarr has
# actually queued the episode. Cron still fires every minute (k8s has
# no native "stop on success" for CronJob) but post-grab invocations
# are sub-200ms no-ops.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sonarr-rapid-rss
spec:
  schedule: "* 8 * * 3"
  timeZone: Europe/London
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: trigger
              image: alpine:3.22
              env:
                - name: SONARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: sonarr-secret
                      key: SONARR_API_KEY
                - name: SONARR_URL
                  value: http://sonarr.media.svc.cluster.local:8989
                # Window: episodes that aired in the last 36h (catches
                # late-night drops) and not more than 1h in the future.
                - name: WINDOW_PAST_SECONDS
                  value: "129600"  # 36h
                - name: WINDOW_FUTURE_SECONDS
                  value: "3600"    # 1h
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  apk add --no-cache --quiet curl jq >/dev/null

                  AUTH="X-Api-Key: $SONARR_API_KEY"
                  NOW=$(date -u +%s)
                  LOW=$((NOW - WINDOW_PAST_SECONDS))
                  HIGH=$((NOW + WINDOW_FUTURE_SECONDS))

                  QUEUE_JSON=$(curl -fsS --max-time 10 -H "$AUTH" \
                    "$SONARR_URL/api/v3/queue?pageSize=200&includeEpisode=true")

                  NEED=$(curl -fsS --max-time 10 -H "$AUTH" \
                    "$SONARR_URL/api/v3/wanted/missing?pageSize=100&sortKey=airDateUtc&sortDirection=descending&monitored=true" \
                    | jq --argjson queue "$QUEUE_JSON" \
                         --argjson low "$LOW" \
                         --argjson high "$HIGH" '
                        ($queue.records // [] | map(.episodeId) | unique) as $qids
                        | [.records[]
                           | select(.airDateUtc != null)
                           | select(
                               (.airDateUtc | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601) as $t
                               | $t > $low and $t < $high
                             )
                           | select([.id] | inside($qids) | not)]
                        | length')

                  if [ "${NEED:-0}" -le 0 ]; then
                    echo "[$(date -u +%H:%M:%SZ)] Nothing recently aired is missing and not in queue - skip"
                    exit 0
                  fi

                  echo "[$(date -u +%H:%M:%SZ)] $NEED episode(s) need grabbing - triggering RssSync"
                  curl -fsS --max-time 30 -H "$AUTH" -H "Content-Type: application/json" \
                    -X POST "$SONARR_URL/api/v3/command" \
                    -d '{"name":"RssSync"}' \
                    -o /dev/null \
                    -w "RssSync: HTTP %{http_code} in %{time_total}s\n"
