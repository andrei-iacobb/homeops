---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: network

components:
  - ../../components/sops

resources:
  - ./namespace.yaml
  # cloudflare-ddns removed: it only updated wg.iacob.co.uk -> home WAN IP, which
  # leaked the home address. WG endpoint deleted from DNS; deployment no longer needed.
  - ./cloudflare-dns/ks.yaml
  - ./cloudflare-tunnel/ks.yaml
  - ./envoy-gateway/ks.yaml
  - ./k8s-gateway/ks.yaml
  - ./headscale/ks.yaml
