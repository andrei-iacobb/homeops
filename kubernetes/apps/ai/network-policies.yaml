---
# Ollama: only allow from OpenWebUI (ai namespace) and Informate (default namespace)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ollama-ingress
  namespace: ai
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ollama
  ingress:
    # OpenWebUI (same namespace)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ai
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # Informate (default namespace)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: default
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # Kubelet health probes
    - fromEntities:
        - host
---
# Arca: strict ingress + egress — only Anthropic API allowed out, nothing else
# Sub-agents spawned by claude are trapped in the bwrap sandbox + this policy
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arca
  namespace: ai
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: arca
  ingress:
    # Web UI access via Envoy Gateway
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: network
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Kubelet health probes
    - fromEntities:
        - host
  egress:
    # CoreDNS — Cilium must proxy DNS to learn IPs for FQDN rules below
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:app.kubernetes.io/name: coredns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    # External HTTPS — Anthropic API + Google OAuth
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# OpenWebUI: allow from envoy gateway (network namespace) and health probes
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openwebui-ingress
  namespace: ai
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  ingress:
    # Envoy Gateway ingress
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: network
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Kubelet health probes
    - fromEntities:
        - host
