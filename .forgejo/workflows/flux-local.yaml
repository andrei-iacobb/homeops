---
# Flux manifest validation. flux-local (allenporter) was sunsetted upstream in
# 2026; replaced by flate (github.com/home-operations/flate), the maintained
# drop-in that bundles helm/kustomize in one container image.
#
# The runner uses docker-in-docker: the dind daemon cannot see $GITHUB_WORKSPACE,
# so a plain `docker run -v "$GITHUB_WORKSPACE":...` mounts an empty dir. Instead
# we clone into a named docker volume (which dind owns) and run flate against it.
# --cache-dir /tmp keeps flate's cache off the unwritable default (/.cache).
name: "Flux Local"

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  FLATE_IMAGE: ghcr.io/home-operations/flate:latest
  GIT_IMAGE: alpine/git:latest
  CLUSTER_PATH: kubernetes/flux/cluster

jobs:
  pre-job:
    name: Flux Local Pre-Job
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: kubernetes/**

  test:
    name: Flux Local Test
    needs: pre-job
    runs-on: ubuntu-latest
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Run flate test
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -eo pipefail
          VOL="flate-${GITHUB_RUN_ID}-test"
          docker volume create "$VOL" >/dev/null
          trap 'docker volume rm "$VOL" >/dev/null 2>&1 || true' EXIT
          CLONE_URL="https://token:${TOKEN}@${SERVER#https://}/${REPO}.git"
          docker run --rm -v "$VOL":/w "$GIT_IMAGE" \
            clone --depth 1 --branch "$HEAD_REF" "$CLONE_URL" /w/pr
          docker run --rm -v "$VOL":/w "$FLATE_IMAGE" \
            test all --path "/w/pr/${CLUSTER_PATH}" --cache-dir /tmp/flate-cache --no-progress

  diff:
    name: Flux Local Diff
    needs: pre-job
    runs-on: ubuntu-latest
    # Informational only - never blocks the merge gate.
    continue-on-error: true
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Run flate diff
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          set -eo pipefail
          VOL="flate-${GITHUB_RUN_ID}-diff"
          docker volume create "$VOL" >/dev/null
          trap 'docker volume rm "$VOL" >/dev/null 2>&1 || true' EXIT
          CLONE_URL="https://token:${TOKEN}@${SERVER#https://}/${REPO}.git"
          docker run --rm -v "$VOL":/w "$GIT_IMAGE" \
            clone --depth 1 --branch "$HEAD_REF" "$CLONE_URL" /w/pr
          docker run --rm -v "$VOL":/w "$GIT_IMAGE" \
            clone --depth 1 --branch "$BASE_REF" "$CLONE_URL" /w/base
          docker run --rm -v "$VOL":/w "$FLATE_IMAGE" \
            diff all \
            --path "/w/pr/${CLUSTER_PATH}" \
            --path-orig "/w/base/${CLUSTER_PATH}" \
            --cache-dir /tmp/flate-cache \
            --output gitea --no-progress | tee diff.out || true
          if [ -s diff.out ]; then
            BODY=$(printf '### Flux Diff\n```diff\n%s\n```' "$(head -c 60000 diff.out)")
            jq -n --arg b "$BODY" '{body:$b}' | curl -s -X POST \
              "${SERVER}/api/v1/repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
              -d @- >/dev/null || true
          fi

  flux-local-status:
    name: Flux Local Success
    needs: ["test", "diff"]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      # Gate ONLY on the test job. diff is informational (continue-on-error) and
      # must never block automerge.
      - name: Check test result
        run: |
          echo "test=${{ needs.test.result }} diff=${{ needs.diff.result }}"
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "flate test failed"
            exit 1
          fi
          echo "flate test passed or skipped"
