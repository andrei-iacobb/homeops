---
# Flux manifest validation. flux-local was sunsetted upstream (2026); replaced by
# flate (github.com/home-operations/flate), the maintained drop-in. Runs as a
# self-contained container image on the Forgejo dind runner - bundles helm/kustomize.
name: "Flux Local"

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-job:
    name: Flux Local Pre-Job
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: kubernetes/**

  test:
    name: Flux Local Test
    needs: pre-job
    runs-on: ubuntu-latest
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run flate test
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OUT=$(docker run --rm -v "$GITHUB_WORKSPACE":/w \
            ghcr.io/home-operations/flate:latest \
            test all --path /w/kubernetes/flux/cluster --cache-dir /tmp/flate-cache --no-progress 2>&1)
          CODE=$?
          echo "$OUT"
          echo "::flate-exit::$CODE"
          BODY=$(printf '### flate test debug (exit %s)\n```\n%s\n```' "$CODE" "$(echo "$OUT" | tail -35)")
          jq -n --arg b "$BODY" '{body:$b}' | curl -s -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" \
            -H "Authorization: token $TOKEN" -H "Content-Type: application/json" -d @- >/dev/null || true
          exit $CODE

  diff:
    name: Flux Local Diff
    needs: pre-job
    runs-on: ubuntu-latest
    # Informational only - never blocks the merge gate.
    continue-on-error: true
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@v4
        with:
          path: pull

      - name: Checkout Default Branch
        uses: actions/checkout@v4
        with:
          ref: "${{ github.event.repository.default_branch }}"
          path: default

      - name: Run flate diff
        continue-on-error: true
        uses: docker://ghcr.io/home-operations/flate:latest
        with:
          args: >-
            diff all
            --path /github/workspace/pull/kubernetes/flux/cluster
            --path-orig /github/workspace/default/kubernetes/flux/cluster
            --cache-dir /tmp/flate-cache
            --output gitea
            --no-progress

  flux-local-status:
    name: Flux Local Success
    needs: ["test", "diff"]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      # Gate ONLY on the test job. diff is informational (continue-on-error) and
      # must never block automerge.
      - name: Check test result
        run: |
          echo "test=${{ needs.test.result }} diff=${{ needs.diff.result }}"
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "flate test failed"
            exit 1
          fi
          echo "flate test passed or skipped"
