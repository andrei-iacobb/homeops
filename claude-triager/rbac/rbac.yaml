---
# Kubernetes RBAC for autonomous SRE triager (TWO-SERVICE-ACCOUNT SPLIT)
#
# SECURITY BOUNDARY:
# - claude-triager-ro: ClusterRole READ-ONLY (get/list/watch on resources)
# - claude-triager-rw: namespaced Roles WRITE in media, default, monitoring ONLY
#
# CAVEAT: kubectl patch on deployments/statefulsets/daemonsets is inherently broader than
# annotation-only changes (it can modify any field in spec.template). HOWEVER:
# (a) ONLY the bot holds the rw kubeconfig and runs only regex-validated whitelisted commands
# (b) writes are confined to 3 non-protected namespaces (media, default, monitoring)
# (c) no write access to ANY other namespace, kube-system, cert-manager, network, storage,
#     databases, flux-system, cilium-secrets, external-services, volsync-system, etc.
# This is the hard wall that prevents prompt-injection from expanding permissions.

# ====== READ-ONLY SERVICE ACCOUNT ======

apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-triager-ro
  namespace: monitoring

---
# ClusterRole: READ-ONLY access across entire cluster
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-triager-ro
rules:
  # Core resources: pods, logs, services, endpoints, events, namespaces, nodes, PVs/PVCs
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - events
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
    verbs:
      - get
      - list
      - watch

  # Apps: deployments, statefulsets, daemonsets, replicasets
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs:
      - get
      - list
      - watch

  # Batch jobs
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch

  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch

  # Flux CRDs: HelmRelease
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs:
      - get
      - list
      - watch

  # Flux CRDs: Kustomization
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs:
      - get
      - list
      - watch

  # Flux CRDs: source (GitRepository, OCIRepository, HelmRepository)
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - ocirepositories
      - helmrepositories
    verbs:
      - get
      - list
      - watch

  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list

---
# ClusterRoleBinding: bind read-only ClusterRole to RO ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-triager-ro
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-triager-ro
subjects:
  - kind: ServiceAccount
    name: claude-triager-ro
    namespace: monitoring

---
# ====== READ-WRITE SERVICE ACCOUNT ======

apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-triager-rw
  namespace: monitoring

---
# Role: WRITE access in namespace "media"
# Allows: pod deletion, deployment/statefulset/daemonset patching (for rollout restart),
#         helmrelease/kustomization patching (for Flux reconcile annotation),
#         job deletion
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-triager-write
  namespace: media
rules:
  # Delete stuck/OOMKilled/Terminating pods
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - delete
      - get
      - list

  # Patch deployments, statefulsets, daemonsets (for rollout restart via spec.template patch)
  # Note: NO update, NO create, NO delete (only patch)
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - patch

  # Patch HelmRelease for Flux reconcile (annotate reconcile.fluxcd.io/requestedAt)
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs:
      - get
      - list
      - patch

  # Patch Kustomization for Flux reconcile (annotate reconcile.fluxcd.io/requestedAt)
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs:
      - get
      - list
      - patch

  # Delete completed/failed jobs
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs:
      - get
      - list
      - delete

---
# RoleBinding: bind write Role to RW ServiceAccount in namespace "media"
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-triager-write
  namespace: media
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-triager-write
subjects:
  - kind: ServiceAccount
    name: claude-triager-rw
    namespace: monitoring

---
# Role: WRITE access in namespace "default"
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-triager-write
  namespace: default
rules:
  # Delete stuck/OOMKilled/Terminating pods
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - delete
      - get
      - list

  # Patch deployments, statefulsets, daemonsets (for rollout restart)
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - patch

  # Patch HelmRelease for Flux reconcile
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs:
      - get
      - list
      - patch

  # Patch Kustomization for Flux reconcile
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs:
      - get
      - list
      - patch

  # Delete completed/failed jobs
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs:
      - get
      - list
      - delete

---
# RoleBinding: bind write Role to RW ServiceAccount in namespace "default"
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-triager-write
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-triager-write
subjects:
  - kind: ServiceAccount
    name: claude-triager-rw
    namespace: monitoring

---
# Role: WRITE access in namespace "monitoring"
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-triager-write
  namespace: monitoring
rules:
  # Delete stuck/OOMKilled/Terminating pods
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - delete
      - get
      - list

  # Patch deployments, statefulsets, daemonsets (for rollout restart)
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - patch

  # Patch HelmRelease for Flux reconcile
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs:
      - get
      - list
      - patch

  # Patch Kustomization for Flux reconcile
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs:
      - get
      - list
      - patch

  # Delete completed/failed jobs
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs:
      - get
      - list
      - delete

---
# RoleBinding: bind write Role to RW ServiceAccount in namespace "monitoring"
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-triager-write
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-triager-write
subjects:
  - kind: ServiceAccount
    name: claude-triager-rw
    namespace: monitoring
